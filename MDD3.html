<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상약사 강화 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
        }
        
        .game-screen {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            border: 4px solid #334155;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* 대화창 */
        .dialogue-box {
            background: rgba(15, 23, 42, 0.95);
            border-top: 4px solid #3b82f6;
            backdrop-filter: blur(10px);
        }

        /* 캐릭터 크기 및 애니메이션 */
        .char-sprite {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-char { transform: scale(1.15); filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.5)); }
        .inactive-char { filter: brightness(0.4) grayscale(0.5); transform: scale(0.95); }

        /* 선택지 */
        .choice-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #475569;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background: #3b82f6;
            border-color: #60a5fa;
            transform: translateX(8px);
        }

        /* 피파 강화 연출 */
        .fifa-card {
            width: 300px;
            height: 450px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.4);
            animation: card-entry 1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .fifa-card.fail {
            background: linear-gradient(135deg, #94a3b8 0%, #475569 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.1);
        }
        @keyframes card-entry {
            0% { transform: scale(0.5) rotateY(90deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }
        .success-glow {
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 30px #fbbf24; transform: scale(1); }
            to { box-shadow: 0 0 70px #fbbf24, 0 0 120px #f59e0b; transform: scale(1.02); }
        }

        .result-img-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .result-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 폰트 통일 */
        .custom-font { font-family: 'Noto Sans KR', sans-serif !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-app" class="max-w-5xl w-full aspect-[16/10] game-screen rounded-2xl relative overflow-hidden flex flex-col">
        
        <!-- 상단 UI (FIFA 스타일) -->
        <div class="p-6 grid grid-cols-2 gap-12 bg-black/70 z-20 border-b border-blue-500/30">
            <div class="space-y-2">
                <div class="flex justify-between text-xs font-black tracking-widest text-blue-400 custom-font">
                    <span>지식 게이지 (KNOWLEDGE)</span>
                    <span id="score-text" class="custom-font">0 / 15</span>
                </div>
                <div class="h-3 w-full bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                    <div id="score-bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-xs font-black tracking-widest text-green-400 custom-font">
                    <span>환자 신뢰도 (TRUST)</span>
                    <span id="trust-text" class="custom-font">50%</span>
                </div>
                <div class="h-3 w-full bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                    <div id="trust-bar" class="h-full bg-gradient-to-r from-green-600 to-emerald-400 transition-all duration-700" style="width: 50%"></div>
                </div>
            </div>
            <div class="absolute top-20 left-1/2 -translate-x-1/2 px-6 py-1 bg-blue-600 text-white font-black rounded-b-lg text-sm italic shadow-lg custom-font" id="stage-display">STAGE 01</div>
        </div>

        <!-- 필드 -->
        <div class="flex-grow relative flex items-end justify-between px-20 pb-12">
            <div id="char-pharmacist" class="char-sprite flex flex-col items-center">
                <div class="text-[140px] drop-shadow-2xl">👨‍⚕️</div>
                <div class="mt-4 px-6 py-1 bg-blue-600 rounded-md font-bold text-white shadow-lg border border-blue-400">나 (약사)</div>
            </div>

            <div id="char-npc" class="char-sprite flex flex-col items-center">
                <div id="npc-avatar" class="text-[140px] drop-shadow-2xl">👵</div>
                <div id="npc-name-tag" class="mt-4 px-6 py-1 bg-gray-700 rounded-md font-bold text-white shadow-lg border border-gray-500">환자</div>
            </div>
        </div>

        <!-- 하단 대화창 -->
        <div class="h-[38%] z-30 relative">
            <div id="speaker-box" class="absolute -top-10 left-10 px-8 py-2 bg-blue-600 text-white font-black skew-x-[-15deg] border-2 border-white/20 shadow-xl">
                SYSTEM
            </div>
            <div class="dialogue-box h-full p-8 flex flex-col">
                <div id="message-text" class="text-xl md:text-2xl font-bold leading-snug mb-6 text-slate-100">
                    예비 약사 여러분 환영합니다. 12문제 이상 맞춰 미래 약사로서의 '강화'에 성공하십시오.
                </div>
                <div id="choices-container" class="grid grid-cols-2 gap-4 mt-auto">
                    <button onclick="startGame()" class="col-span-2 choice-btn p-5 rounded-lg font-black text-center text-xl text-yellow-400 border-2 border-yellow-500/50 hover:bg-yellow-500/20">
                        ▶ 강화 시나리오 시작
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 레이어 (FIFA 강화 컨셉) -->
        <div id="result-layer" class="hidden absolute inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-8">
            <div id="card-container" class="mb-8">
                <!-- FIFA 카드가 자바스크립트로 생성됨 -->
            </div>
            <div id="result-message" class="text-center space-y-4">
                <h2 id="enchant-result" class="text-6xl font-black italic tracking-tighter">SUCCESS</h2>
                <p id="mentor-msg" class="text-2xl text-gray-100 font-bold italic"></p>
                <button onclick="location.reload()" class="mt-8 px-12 py-4 bg-white text-black font-black rounded-full hover:bg-gray-200 transition-transform active:scale-90">
                    RETRY
                </button>
            </div>
        </div>

        <!-- 피드백 팝업 -->
        <div id="feedback-layer" class="hidden absolute inset-0 z-40 bg-black/90 flex items-center justify-center p-8">
            <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-3xl text-center max-w-2xl shadow-[0_0_50px_rgba(59,130,246,0.4)]">
                <div id="feedback-icon" class="text-7xl mb-4"></div>
                <h3 id="feedback-title" class="text-3xl font-black mb-4 italic text-blue-400"></h3>
                <div id="feedback-msg" class="text-gray-200 text-lg leading-relaxed mb-8 border-l-4 border-blue-500 pl-4 text-left"></div>
                <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xl font-black py-4 rounded-xl">
                    NEXT STAGE
                </button>
            </div>
        </div>
    </div>

    <script>
        const scenario = [
            { id: 1, speaker: "김노인(72세)", avatar: "👴", nameColor: "bg-gray-600", msg: "에구... 요즘은 밥맛도 없고 잠도 안 와. 아침에 눈 뜨는 게 지옥 같네. 그냥 늙어서 기운이 없는 건가?", choices: [{ text: "단순 노화 현상이니 잘 챙겨 드시면 나아질 거예요.", correct: false, reason: "노인 우울증은 신체 증상으로 나타나는 경우가 많습니다. 반드시 진단 기준에 따라 평가해야 합니다." }, { text: "식욕 부진과 불면도 우울증의 신체 증상일 수 있습니다. 2주 넘게 증상이 지속되셨나요?", correct: true, reason: "정확합니다! 노인 우울증은 감정보다 신체적 불편함을 호소하는 경우가 많습니다." }] },
            { id: 2, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "DSM-5-TR 진단 기준에서 5가지 증상 중 반드시 포함되어야 하는 핵심 증상 2가지는?", choices: [{ text: "수면 장애 혹은 체중 변화", correct: false, reason: "이들은 동반 증상입니다. 핵심은 기분과 흥미입니다." }, { text: "우울한 기분 혹은 흥미 및 즐거움의 상실", correct: true, reason: "정답입니다! 두 가지 중 하나는 반드시 포함되어야 합니다." }] },
            { id: 3, speaker: "박대리(30세)", avatar: "👨", nameColor: "bg-blue-800", msg: "회사 생활이 너무 힘들어요. 보통 우울증 약을 처음 시작할 때 어떤 계열을 쓰나요?", choices: [{ text: "TCA (예: Amitriptyline)", correct: false, reason: "TCA는 부작용이 커서 1차 치료제로는 잘 쓰이지 않습니다." }, { text: "SSRI (예: Escitalopram, Sertraline)", correct: true, reason: "맞습니다. SSRI는 부작용 프로파일이 우수하여 임상에서 가장 먼저 고려됩니다." }] },
            { id: 4, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "SSRI의 기전을 환자에게 어떻게 설명할까요?", choices: [{ text: "뇌에서 세로토닌의 재흡수를 막아 농도를 높여줍니다.", correct: true, reason: "완벽합니다! SSRI는 선택적 세로토닌 재흡수 억제제입니다." }, { text: "뇌의 모든 신경전달물질을 활성화합니다.", correct: false, reason: "세로토닌을 선택적으로 조절하는 것이 특징입니다." }] },
            { id: 5, speaker: "박대리(30세)", avatar: "👨", nameColor: "bg-blue-800", msg: "약을 먹었는데 속이 울렁거리고 자꾸 설사가 나요... 약이 잘못된 거 아닌가요?", choices: [{ text: "초기 위장관계 부작용입니다. 식사 직후 복용하고 조금만 견뎌보세요.", correct: true, reason: "맞습니다. 위장관의 세로토닌 수용체 때문에 발생하며 시간이 지나면 나아집니다." }, { text: "심각한 알레르기입니다. 당장 약을 끊으세요.", correct: false, reason: "일반적인 초기 부작용입니다. 복약 이행도를 높여야 합니다." }] },
            { id: 6, speaker: "이지혜(28세, 임산부)", avatar: "👩‍🦰", nameColor: "bg-pink-600", msg: "임신 초기인데, 태아에게 가장 위험한 항우울제가 있다고 들었어요. 무엇인가요?", choices: [{ text: "Paroxetine", correct: true, reason: "Paroxetine은 심장 기형 위험이 보고되어 임신 초기에는 피하는 것이 원칙입니다." }, { text: "Sertraline", correct: false, reason: "Sertraline은 비교적 안전 데이터가 많아 임산부에게 고려됩니다." }] },
            { id: 7, speaker: "최안경(55세)", avatar: "👓", nameColor: "bg-amber-800", msg: "전립선 비대증이 있는데, 우울증 약 먹고 소변이 아예 안 나올 수도 있나요?", choices: [{ text: "TCA (예: Amitriptyline)", correct: true, reason: "TCA의 강력한 항콜린 효과는 요패를 악화시킬 수 있습니다." }, { text: "Vortioxetine", correct: false, reason: "Vortioxetine은 항콜린 작용이 거의 없어 전립선 환자에게 더 적합합니다." }] },
            { id: 8, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "우울증과 금연 치료를 동시에 하고 싶은 환자에게 추천할 약은?", choices: [{ text: "Mirtazapine", correct: false, reason: "Mirtazapine은 식욕과 수면에 영향을 주며 금연과는 무관합니다." }, { text: "Bupropion", correct: true, reason: "Bupropion은 금연 보조 효과가 승인된 항우울제입니다." }] },
            { id: 9, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "Bupropion 복용 환자의 과거력 중 가장 주의 깊게 확인해야 할 질환은?", choices: [{ text: "발작 및 간질(Seizure)", correct: true, reason: "Bupropion은 경련 역치를 낮추므로 간질 환자에게는 금기입니다." }, { text: "녹내장", correct: false, reason: "녹내장은 주로 TCA 계열에서 주의해야 합니다." }] },
            { id: 10, speaker: "김건강(40세)", avatar: "🏃", nameColor: "bg-green-700", msg: "약 두 종류를 두 달씩 먹었는데도 효과가 없어요. '치료 저항성 우울증(TRD)'이 뭔가요?", choices: [{ text: "적절한 용량의 다른 두 항우울제를 충분 기간 썼는데도 호전이 없는 상태", correct: true, reason: "정확한 정의입니다. 이 경우 전략 수정이 필요합니다." }, { text: "약 먹는 걸 자꾸 까먹어서 치료가 안 되는 상태", correct: false, reason: "그것은 단순 복약 이행도 저하입니다." }] },
            { id: 11, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "TRD 환자에게 효과를 증강하기 위해 병용하는 가장 근거 확실한 약은?", choices: [{ text: "비정형 항정신병약 (Aripiprazole 등)", correct: true, reason: "SGA 저용량 병용은 TRD 치료의 표준 가이드라인입니다." }, { text: "수면제 (Zolpidem 등)", correct: false, reason: "수면제는 우울증 자체를 치료하지는 않습니다." }] },
            { id: 12, speaker: "고혈압 환자(60세)", avatar: "🤒", nameColor: "bg-red-800", msg: "고혈압 약을 먹고 있어요. 우울증 약 중에 혈압을 올릴 수 있는 게 있나요?", choices: [{ text: "SNRI (예: Venlafaxine)", correct: true, reason: "SNRI는 노르에피네프린 영향으로 혈압을 상승시킬 수 있습니다." }, { text: "Mirtazapine", correct: false, reason: "Mirtazapine은 주로 진정 작용과 체중 증가가 부작용입니다." }] },
            { id: 13, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "Fluoxetine 중단 후 MAOI를 시작하려면 얼마의 휴지기가 필요한가요?", choices: [{ text: "5주", correct: true, reason: "Fluoxetine은 반감기가 매우 길어 5주의 Wash-out 기간이 필수입니다." }, { text: "2주", correct: false, reason: "다른 SSRI는 2주지만 Fluoxetine은 더 깁니다." }] },
            { id: 14, speaker: "응급대원", avatar: "🚑", nameColor: "bg-red-600", msg: "항우울제 과다 복용 환자입니다. 고열과 근육 경직이 심해요!", choices: [{ text: "세로토닌 증후군", correct: true, reason: "고열, 경직은 세로토닌 증후군의 전형적 징후이며 응급입니다." }, { text: "단순 몸살 감기", correct: false, reason: "항우울제 복용 시 이런 증상은 절대 가볍게 넘겨선 안 됩니다." }] },
            { id: 15, speaker: "나(약사)", avatar: "👨‍⚕️", nameColor: "bg-blue-600", msg: "관해 상태의 환자가 약을 바로 끊고 싶어 합니다. 어떻게 안내할까요?", choices: [{ text: "네, 오늘부터 바로 끊으셔도 됩니다.", correct: false, reason: "즉시 중단 시 재발 위험과 금단 증상이 큽니다." }, { text: "재발 방지를 위해 4~9개월간 유지 요법을 지속해야 합니다.", correct: true, reason: "정답입니다! 충분한 유지 기간이 재발 방지의 핵심입니다." }] }
        ];

        let currentStage = 0;
        let correctCount = 0;
        let trust = 50;

        function updateStats() {
            document.getElementById('score-bar').style.width = `${(correctCount / 15) * 100}%`;
            document.getElementById('trust-bar').style.width = `${trust}%`;
            document.getElementById('score-text').innerText = `${correctCount} / 15`;
            document.getElementById('trust-text').innerText = `${trust}%`;
        }

        function startGame() {
            currentStage = 0; correctCount = 0; trust = 50;
            document.getElementById('result-layer').classList.add('hidden');
            updateStats(); loadStage();
        }

        function loadStage() {
            if (currentStage >= scenario.length) { showFinalResult(); return; }
            const step = scenario[currentStage];
            document.getElementById('stage-display').innerText = `STAGE ${String(currentStage + 1).padStart(2, '0')}`;
            document.getElementById('speaker-box').innerText = step.speaker.split('(')[0];
            document.getElementById('message-text').innerText = step.msg;
            document.getElementById('npc-avatar').innerText = step.avatar;
            document.getElementById('npc-name-tag').innerText = step.speaker;

            if (step.speaker.includes("나")) {
                document.getElementById('char-pharmacist').className = 'char-sprite active-char flex flex-col items-center';
                document.getElementById('char-npc').className = 'char-sprite inactive-char flex flex-col items-center';
            } else {
                document.getElementById('char-npc').className = 'char-sprite active-char flex flex-col items-center';
                document.getElementById('char-pharmacist').className = 'char-sprite inactive-char flex flex-col items-center';
            }

            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            step.choices.forEach((choice, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn p-4 rounded-xl font-bold text-left text-gray-100 border-2 border-white/10 custom-font';
                btn.innerHTML = `<span class="text-blue-400 mr-2">${idx + 1}.</span> ${choice.text}`;
                btn.onclick = () => {
                    if (choice.correct) { correctCount++; trust = Math.min(100, trust + 10); showFeedback("🌟", "SUCCESS", choice.reason); }
                    else { trust = Math.max(0, trust - 15); showFeedback("⚠️", "WARNING", choice.reason); }
                    updateStats();
                };
                container.appendChild(btn);
            });
        }

        function showFeedback(icon, title, msg) {
            document.getElementById('feedback-icon').innerText = icon;
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-msg').innerText = msg;
            document.getElementById('feedback-layer').classList.remove('hidden');
            document.getElementById('next-btn').onclick = () => {
                document.getElementById('feedback-layer').classList.add('hidden');
                currentStage++; loadStage();
            };
        }

        function showFinalResult() {
            const resultLayer = document.getElementById('result-layer');
