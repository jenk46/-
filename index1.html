<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미약시 - 미래 약사 시뮬레이션</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');

        :root {
            --primary: #a1887f;     
            --accent: #d7ccc8;      
            --bg-dark: #3e2723;     
            --glass: rgba(255, 255, 255, 0.1); 
            --ui-bg: rgba(62, 39, 35, 0.9);   
            --text-main: #fbe9e7;   
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main); 
            overflow: hidden;
        }

        /* 전체 게임 무대 */
        #game-stage {
            width: 1000px;
            height: 700px;
            background: linear-gradient(to bottom, #d7ccc8 0%, #bcaaa4 100%);
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            border: 8px solid #efebe9; 
        }

        #game-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/white-wall-2.png');
            opacity: 0.2; 
        }

        /* 캐릭터 선택 화면 */
        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(30, 15, 10, 0.9); 
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .main-title {
            font-size: 3.5em;
            font-weight: 900;
            color: var(--accent); 
            text-shadow: 0 0 20px rgba(215, 204, 200, 0.6);
            margin-bottom: 10px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            width: 180px;
            height: 280px;
            background: var(--glass);
            border: 2px solid rgba(215, 204, 200, 0.3); 
            border-radius: 20px;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-15px);
            background: var(--primary); 
            border-color: #efebe9;
        }

        .card-icon { font-size: 80px; margin-bottom: 20px; }
        .card-name { font-weight: bold; font-size: 1.2em; color: var(--text-main); }

        /* 인게임 UI */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .dep-container {
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            border: 1px solid var(--accent); 
        }

        #dep-bar-bg {
            width: 200px;
            height: 12px;
            background: #5d4037; 
            border-radius: 10px;
            margin-left: 15px;
            overflow: hidden;
        }

        #dep-bar-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #bcaaa4, #8d6e63);
            transition: 0.5s;
        }

        /* 캐릭터 비주얼 */
        #char-visual {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 350px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            z-index: 2;
        }

        /* 대화창 */
        #dialogue-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 180px;
            background: var(--ui-bg);
            border-radius: 20px;
            border: 2px solid var(--accent); 
            padding: 30px 40px;
            box-sizing: border-box;
            z-index: 5;
            backdrop-filter: blur(10px);
            cursor: pointer; /* 클릭할 수 있다는 시각적 피드백 */
        }

        #name-label {
            position: absolute;
            top: -20px;
            left: 40px;
            background: var(--accent); 
            color: #3e2723; 
            padding: 5px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.3em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #text-box {
            font-size: 1.3em;
            line-height: 1.6;
            color: var(--text-main);
            text-shadow: 1px 1px 2px black;
        }

        /* ★ 깜빡거리는 안내 문구 스타일 추가 ★ */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .click-hint {
            display: block;
            margin-top: 15px;
            font-size: 0.75em;
            color: var(--primary);
            animation: blink 1.5s infinite;
        }

        /* 선택지 영역 (화면 흐림 효과 포함) */
        #choice-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: rgba(30, 15, 10, 0.5); 
            backdrop-filter: blur(5px); /* 흐림 효과 강화 */
            animation: fadeIn 0.3s ease; /* 부드럽게 나타나는 효과 */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-choice {
            width: 70%;
            padding: 20px;
            background: #efebe9; 
            color: #3e2723; 
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: left;
            padding-left: 40px;
        }

        .btn-choice:hover {
            background: var(--primary); 
            color: white;
            transform: scale(1.03);
        }

        /* 미니게임 팝업 생략(기존 동일) */
        #mini-game-modal {
            position: absolute;
            inset: 0;
            background: rgba(30, 15, 10, 0.95); 
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .mini-game-content {
            background: #efebe9; color: #3e2723; padding: 40px; border-radius: 30px; width: 600px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .order-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .order-btn { padding: 15px; border: 2px solid #d7ccc8; border-radius: 10px; background: white; color: #3e2723; font-weight: bold; cursor: pointer; }
        .order-btn:hover { background: var(--accent); } 
        .order-btn:disabled { background: #d7ccc8; color: #8d6e63; cursor: default; }
        #mini-game-feedback { margin-top: 20px; font-weight: bold; color: #d84315; min-height: 24px; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="start-screen">
        <div class="main-title">미약시 - 미래 약사 시뮬레이션</div>
        <p style="font-size: 1.2em; color: #bcaaa4;">오늘의 상담 환자를 선택해주세요</p>
        <div class="card-grid" id="card-grid-container"></div>
    </div>

    <div id="status-bar" style="display:none;">
        <div class="dep-container">
            <span id="case-name" style="font-weight:bold;">상담 중</span>
            <div id="dep-bar-bg"><div id="dep-bar-fill"></div></div>
        </div>
        <div class="dep-container" style="color:var(--accent); font-weight:bold;">PHARMACIST MODE</div>
    </div>

    <div id="char-visual" style="display:none;"></div>

    <div id="choice-overlay"></div>

    <div id="dialogue-container" style="display:none;">
        <div id="name-label">환자</div>
        <div id="text-box"></div>
    </div>

    <div id="mini-game-modal">
        <div class="mini-game-content">
            <h2 style="color:var(--primary);">🎯 복약지도 트레이닝</h2>
            <p>올바른 순서대로 클릭하여 환자에게 시범을 보이세요!</p>
            <div id="order-btns" class="order-grid"></div>
            <p id="mini-game-feedback"></p>
        </div>
    </div>
</div>

<script>
    let dep = 50;
    let step = 0;
    let activeCase = null;
    let userOrder = [];
    let isWaitingForChoices = false; // ★ 선택지 표시를 대기하는 상태 변수

    const correctOrder = ["코 풀기", "45도 고개 젖히기", "피스톤 끝까지 누르기", "가볍게 킁 흡입", "5분 휴식"];

    const scenarios = {
        1: { 
            name: "청소년 A", iconNormal: "👦", iconHappy: "😄", iconSad: "😫",
            script: [
                { q: "“...처방전이요. 여드름 약 먹고 있는데 감기약 같이 먹어도 되죠?”", a: [{t: "“복용 중인 여드름 약 이름을 정확히 확인해 볼까요?”", d: -5}, {t: "“네, 처방 나온 거니 그냥 드셔도 돼요.”", fail: "이소트레티노인 부작용 체크 누락!", d: 30}] },
                { q: "“이소트레티노인이에요. 근데 자꾸 기분이 쳐지고 죽고 싶단 생각도 들어요.”", a: [{t: "“그 약은 심각한 우울감을 유발할 수 있어요. 당장 복용 중단하세요!”", d: -10}, {t: "“공부가 힘들어서 그럴 거예요. 기운 내세요.”", fail: "자살 신호 방치!", d: 40}] },
                { q: "“약 때문에 그럴 수 있다니 다행(?)이네요... 부모님께는 뭐라고 하죠?”", a: [{t: "“부작용 가능성을 설명드리고 당장 피부과 의사 선생님께 알려야 해요.”", d: -10}, {t: "“그냥 기분이 안 좋다고만 하세요.”", fail: "정보 전달 부실!", d: 20}] },
                { q: "“상담해주셔서 감사합니다. 정말 큰일 날 뻔했네요.”", a: [{t: "“언제든 기분이 이상하면 다시 오세요. 꼭 병원 가셔야 해요!”", d: -10}, {t: "“네, 조심해서 드세요.”", d: 0}] }
            ]
        },
        2: { 
            name: "여성 B", iconNormal: "👩", iconHappy: "😊", iconSad: "😥",
            script: [
                { q: "“약사님, 저 이제 아이를 가지려는데 먹던 우울제 바로 끊으면 될까요?”", a: [{t: "“갑자기 끊으면 반동 현상이 오니 서서히 줄여야 합니다.”", d: -5}, {t: "“네, 오늘부터 당장 끊으세요.”", fail: "급격한 단약 위험!", d: 35}] },
                { q: "“서서히 줄이는 게 안전하군요. 그럼 제가 임의로 반 알씩 쪼개 먹을까요?”", a: [{t: "“아니요, 의사 선생님과 상의해서 정교한 스케줄을 짜야 합니다.”", d: -10}, {t: "“네, 그렇게 해보세요.”", fail: "임의 조절 위험!", d: 30}] },
                { q: "“줄이는 중에 다시 기분이 불안해지거나 우울해지면 어쩌죠?”", a: [{t: "“즉시 감량을 멈추고 현재 용량을 유지하며 상담해야 해요.”", d: -15}, {t: "“참으셔야 합니다.”", fail: "환자 방치!", d: 30}] },
                { q: "“휴... 마음이 좀 놓이네요. 엽산 같은 영양제는 같이 먹어도 될까요?”", a: [{t: "“네, 영양제 복용은 좋습니다. 단, 종류를 저와 확인해봐요.”", d: -10}, {t: "“나중에 드세요.”", d: 0}] }
            ]
        },
        3: { 
            name: "노인 C", iconNormal: "👵", iconHappy: "😊", iconSad: "😔",
            script: [
                { q: "“영감 떠나고 나니 아무 의욕도 없어... 약 좀 지어줘요.”", a: [{t: "“어르신, 처음엔 낮은 용량부터 조심스럽게 시작해 볼게요.”", d: -10}, {t: "“센 약으로 빨리 낫게 해드릴게요.”", fail: "노인 고용량 위험!", d: 35}] },
                { q: "“내가 혈압약이랑 당뇨약도 한 주먹씩 먹고 있는데... 괜찮을까?”", a: [{t: "“다른 약물과의 상호작용을 꼼꼼히 검토해 드릴게요.”", d: -10}, {t: "“원래 다 그렇게 먹는 거예요.”", fail: "상호작용 검토 누락!", d: 25}] },
                { q: "“이 약 먹고 더 어지러워서 넘어지면 어쩌나 겁나.”", a: [{t: "“낙상 위험이 적은 약을 골랐어요. 일어날 땐 천천히 움직이세요.”", d: -15}, {t: "“안 넘어져요.”", fail: "낙상 위험 간과!", d: 30}] },
                { q: "“약 먹으면 잠은 좀 잘 올까?”", a: [{t: "“우울증이 좋아지면 잠도 편해질 거예요. 생활 수칙도 알려드릴게요.”", d: -10}, {t: "“수면제 드릴 테니 이거 드세요.”", d: 0}] }
            ]
        },
        4: { 
            name: "남성 D", iconNormal: "👨", iconHappy: "😀", iconSad: "😥",
            script: [
                { q: "“약사님, 스프라바토는 어떻게 쓰는 건가요? 비염 약이랑 똑같죠?”", a: [{t: "“아뇨, 이건 치료 저항성 우울증을 위한 특수 약이라 투여법이 달라요.”", d: -5}, {t: "“네, 코에 넣고 팍팍 뿌리세요.”", fail: "투여 교육 누락!", d: 35}] },
                { q: "“그렇군요. 그럼 병원 오기 전에 든든하게 식사를 하고 가도 될까요?”", a: [{t: "“울렁거릴 수 있으니 투여 2시간 전부터는 반드시 금식하세요.”", d: -10}, {t: "“네, 든든히 드세요.”", fail: "구토 위험 방지 실패!", d: 30}] },
                { q: "“투여하고 나서 바로 운전해서 집에 가도 문제 없겠죠?”", a: [{t: "“아니요, 투여 후 당일은 절대로 운전을 하시면 안 됩니다.”", d: -15}, {t: "“정신만 차리면 괜찮아요.”", fail: "사고 위험 방지!", d: 40}] },
                { q: "“준비됐습니다! 이제 코에 뿌리면 되는 거죠?”", a: [{t: "“잠시만요! 투여 전 정확한 순서를 저랑 연습해 봅시다.”", isMiniGame: true, d: -10}] }
            ]
        }
    };

    const cardGridContainer = document.getElementById('card-grid-container');
    Object.keys(scenarios).forEach(key => {
        const patient = scenarios[key];
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => initGame(key);
        card.innerHTML = `<span class="card-icon">${patient.iconNormal}</span><span class="card-name">${patient.name}</span>`;
        cardGridContainer.appendChild(card);
    });

    function initGame(id) {
        activeCase = scenarios[id];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('status-bar').style.display = 'flex';
        document.getElementById('dialogue-container').style.display = 'block';
        document.getElementById('char-visual').style.display = 'block';
        
        step = 0; dep = 50;
        document.getElementById('case-name').innerText = activeCase.name;
        renderScene();
    }

    function returnToMain() {
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('dialogue-container').style.display = 'none';
        document.getElementById('char-visual').style.display = 'none';
        document.getElementById('choice-overlay').style.display = 'none';
        document.getElementById('mini-game-modal').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';

        activeCase = null;
        step = 0;
        dep = 50;
        isWaitingForChoices = false;
        updateStatus();
    }

    function renderScene() {
        const current = activeCase.script[step];
        const overlay = document.getElementById('choice-overlay');
        overlay.innerHTML = '';
        
        // ★ 처음에 선택지 오버레이를 숨깁니다.
        overlay.style.display = 'none'; 

        if(!current) { finishGame(); return; }

        // ★ 대화창에 깜빡이는 클릭 유도 텍스트를 함께 보여줍니다.
        document.getElementById('text-box').innerHTML = current.q + '<span class="click-hint">▶ 대화창을 클릭하여 선택지 보기</span>';
        
        document.getElementById('char-visual').innerText = activeCase.iconNormal; 
        document.getElementById('char-visual').style.transform = "translateX(-50%) scale(1)";

        const shuffledChoices = [...current.a].sort(() => Math.random() - 0.5);
        shuffledChoices.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = opt.t;
            b.onclick = () => handleSelect(opt);
            overlay.appendChild(b);
        });
        
        updateStatus();

        // ★ 이제 대화창을 클릭할 수 있는 상태가 됩니다.
        isWaitingForChoices = true; 
    }

    // ★ 대화창을 클릭했을 때 발생하는 이벤트 ★
    document.getElementById('dialogue-container').onclick = function() {
        if (isWaitingForChoices) {
            isWaitingForChoices = false; // 중복 클릭 방지
            document.getElementById('choice-overlay').style.display = 'flex'; // 화면 흐려지며 선택지 등장!
            
            // 깔끔하게 깜빡이는 안내 문구를 지워줍니다.
            document.getElementById('text-box').innerHTML = activeCase.script[step].q;
        }
    };

    function handleSelect(opt) {
        document.getElementById('choice-overlay').style.display = 'none';
        const charImg = document.getElementById('char-visual');
        const textBox = document.getElementById('text-box');

        if(opt.fail) {
            dep += opt.d;
            charImg.innerText = activeCase.iconSad; 
            
            charImg.style.transform = "translateX(-50%) rotate(-5deg) scale(1.1)";
            setTimeout(() => charImg.style.transform = "translateX(-50%) rotate(5deg) scale(1.1)", 100);
            setTimeout(() => charImg.style.transform = "translateX(-50%) rotate(0deg) scale(1.1)", 200);

            textBox.innerHTML = `<span style="color:var(--accent); font-weight:bold;">[경고]</span> 환자의 표정이 어두워집니다.<br><span style="color:#ffcccc;">사유: ${opt.fail}</span>`;
            
            updateStatus();

            if(dep >= 100) { 
                setTimeout(() => {
                    textBox.innerHTML = "<span style='color:var(--accent); font-weight:bold;'>[상담 실패]</span> 환자가 신뢰를 잃고 돌아갔습니다. (잠시 후 처음으로 돌아갑니다)";
                    setTimeout(() => returnToMain(), 3000); 
                }, 2000);
                return; 
            }
            setTimeout(() => proceedNext(opt), 2500);

        } else {
            dep += opt.d;
            charImg.innerText = activeCase.iconHappy; 
            textBox.innerHTML = `<span style="color:#ffab91; font-weight:bold;">[올바른 지도]</span> 환자가 고개를 끄덕이며 안심합니다.`;
            
            updateStatus();
            setTimeout(() => proceedNext(opt), 1500);
        }
    }

    function proceedNext(opt) {
        if(opt.isMiniGame) {
            startOrderGame();
        } else {
            step++;
            renderScene();
        }
    }

    function startOrderGame() {
        document.getElementById('choice-overlay').style.display = 'none';
        const modal = document.getElementById('mini-game-modal');
        const btnGrid = document.getElementById('order-btns');
        const feedbackText = document.getElementById('mini-game-feedback');
        
        modal.style.display = 'flex';
        btnGrid.innerHTML = '';
        feedbackText.innerText = '';
        userOrder = [];

        const randomized = [...correctOrder].sort(() => Math.random() - 0.5);
        randomized.forEach(item => {
            const b = document.createElement('button');
            b.className = 'order-btn';
            b.innerText = item;
            b.onclick = () => {
                if(item === correctOrder[userOrder.length]) {
                    userOrder.push(item);
                    b.disabled = true;
                    b.style.background = "#bcaaa4";
                    b.style.color = "white";
                    feedbackText.style.color = "#8d6e63"; 
                    feedbackText.innerText = "좋습니다! 올바른 순서입니다.";

                    if(userOrder.length === correctOrder.length) {
                        feedbackText.innerText = "🏆 완벽한 시범입니다! 환자가 투여법을 잘 숙지했습니다.";
                        setTimeout(() => { 
                            modal.style.display = 'none';
                            finishGame(); 
                        }, 2000);
                    }
                } else {
                    feedbackText.style.color = "#d84315"; 
                    feedbackText.innerText = "❌ 순서가 틀렸습니다! 처음부터 다시 연습해 봅시다.";
                    setTimeout(() => startOrderGame(), 1000); 
                }
            };
            btnGrid.appendChild(b);
        });
    }

    function finishGame() {
        document.getElementById('choice-overlay').style.display = 'none';
        document.getElementById('char-visual').innerText = activeCase.iconHappy; 
        document.getElementById('name-label').innerText = "시스템";
        document.getElementById('text-box').innerHTML = "<span style='color:#ffab91; font-weight:bold;'>[상담 성공]</span> 환자가 약사님의 복약 지도에 매우 만족해하며 돌아갔습니다.<br><span style='font-size:0.8em; color:#efebe9;'>(잠시 후 초기 화면으로 돌아갑니다)</span>";
        
        setTimeout(() => returnToMain(), 4000);
    }

    function updateStatus() {
        document.getElementById('dep-bar-fill').style.width = Math.min(100, Math.max(0, dep)) + "%";
    }
</script>

</body>
</html>
